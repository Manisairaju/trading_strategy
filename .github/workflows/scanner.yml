name: 1-Min Trading Scanner (Interval Triggered)

on:
  schedule:
    # Runs automatically every 5 minutes around the clock (24/7)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Keeps your manual "Run workflow" button active

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests
        pip install git+https://github.com/rongardF/tvdatafeed.git

    - name: Execute Scanner Instance
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
