name: Daily 1-Min Forex Scanner

on:
  schedule:
    # 09:00 UTC corresponds exactly to 2:30 PM IST (Indian Standard Time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to also trigger it manually whenever you want

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Scanner Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
