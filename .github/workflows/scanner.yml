name: 1-Min Trading Scanner (6-Hour Window)

on:
  schedule:
    # Triggers every day at exactly 09:00 UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" to test it anytime

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests
        # Installing the TVDatafeed repository directly to avoid handshake issues
        pip install git+https://github.com/rongardF/tvdatafeed.git

    - name: Run Scanner with 6-Hour Timeout
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 21600 seconds = exactly 6 hours. 
        # This keeps the execution completely clean and safe from GitHub forced-kills.
        timeout 21600 python main.py || echo "Bot session completed successfully after 6 hours."
